<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Good Morning India - A vibrant community celebrating Indian culture and connection.">
    <title>Good Morning India | GooodMorningIndia.com</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Main Hero Section -->
    <main>
        <div class="hero-card">
            <h1>Good Morning India <span class="flag-emoji">☀️🇮🇳</span></h1>
            <p class="subtitle">Follow. Get Featured. Win tomorrow. 🎁☕️</p>
        </div>

        <!-- Search Field -->
        <div class="search-container">
            <input 
                type="text" 
                id="search-input" 
                class="search-field" 
                placeholder="Search your username..."
                aria-label="Search usernames"
            >
            <span class="search-icon">🔍</span>
        </div>

        <!-- Badge Box Container -->
        <div class="badge-box">
            <div id="badge-layer"></div>
        </div>

        <!-- User Cards Container -->
        <div class="user-cards-container">
            <!-- User cards will be dynamically inserted here -->
        </div>
    </main>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="index.js"></script>
</body>
</html>
